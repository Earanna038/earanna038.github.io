<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 100px;
        }

        .card {
            background: white;
            width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.9;
        }

        #message {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Welcome to My Website 🚀</h1>

        <p>
            This webpage is made using HTML, CSS and JavaScript
            inside a single file.
        </p>

        <button onclick="showMessage()">
            Click Me
        </button>

        <p id="message"></p>

    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =
                "Congratulations! JavaScript is running.";
        }
    </script>

</body>
</html>
